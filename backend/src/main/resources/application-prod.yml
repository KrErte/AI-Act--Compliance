spring:
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    baseline-on-migrate: false

server:
  error:
    include-message: never
    include-stacktrace: never

logging:
  level:
    com.aiaudit.platform: INFO
    org.springframework.security: WARN
    root: WARN

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

management:
  endpoint:
    health:
      show-details: never
  endpoints:
    web:
      exposure:
        include: health
