spring:
  application:
    name: aiaudit-platform

  datasource:
    url: jdbc:postgresql://localhost:5432/aiaudit
    username: ${SPRING_DATASOURCE_USERNAME:aiaudit}
    password: ${SPRING_DATASOURCE_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  threads:
    virtual:
      enabled: true

server:
  servlet:
    context-path: /api/v1
  error:
    include-message: never
    include-stacktrace: never

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:}
  access-token-expiry: ${JWT_ACCESS_TOKEN_EXPIRY:900000}
  refresh-token-expiry: ${JWT_REFRESH_TOKEN_EXPIRY:604800000}

# Email
mail:
  from: ${MAIL_FROM:noreply@aiaudit.eu}

# Resend
resend:
  api-key: ${RESEND_API_KEY:}

# App
app:
  frontend-url: ${APP_FRONTEND_URL:https://app.aiaudit.eu}

# LemonSqueezy
lemonsqueezy:
  api-key: ${LEMONSQUEEZY_API_KEY:}
  webhook-secret: ${LEMONSQUEEZY_WEBHOOK_SECRET:}
  store-id: ${LEMONSQUEEZY_STORE_ID:}

# Claude API (Anthropic)
claude:
  api-key: ${CLAUDE_API_KEY:}
  model: ${CLAUDE_MODEL:claude-sonnet-4-20250514}

# File upload
file:
  upload-dir: ${FILE_UPLOAD_DIR:./uploads}
  max-size: ${FILE_MAX_SIZE:10}

# Subscription plan limits
subscription:
  plans:
    STARTER:
      max-ai-systems: 5
    PROFESSIONAL:
      max-ai-systems: 20
    ENTERPRISE:
      max-ai-systems: -1

# Springdoc / Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
