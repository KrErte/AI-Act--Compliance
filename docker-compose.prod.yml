services:
  postgres:
    restart: always
    volumes:
      - pgdata:/var/lib/postgresql/data
      - pgbackup:/var/lib/postgresql/backup
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SITE_ADDRESS: ${SITE_ADDRESS:-aiaudit.eu}
      APP_FRONTEND_URL: ${APP_FRONTEND_URL:-https://aiaudit.eu}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  frontend:
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    restart: always
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-aiaudit.eu}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgbackup:
